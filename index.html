<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RLMB Studio — Creative & Marketing Agency</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #FF4D00;
      --black: #080808;
      --gray1: #141414;
      --gray2: #1A1A1A;
      --white: #F2EDE6;
      --muted: #555555;
      --border: #222222;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  cursor: none;
  overflow-x: hidden;
}

/* CURSOR */
.cursor {
  width: 12px; height: 12px;
  background: var(--orange);
  border-radius: 50%;
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 99999;
  transition: transform 0.1s ease;
  mix-blend-mode: normal;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(255,77,0,0.5);
  border-radius: 50%;
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 99998;
  transition: transform 0.15s ease, width 0.2s, height 0.2s, opacity 0.2s;
}
.cursor.hover { transform: scale(2.5); }
.cursor-ring.hover { width: 60px; height: 60px; opacity: 0.3; }

/* KONAMI OVERLAY */
.konami-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 100000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}
.konami-overlay.active { display: flex; }
.konami-overlay h2 { font-family: 'Bungee', sans-serif; font-size: clamp(2rem,6vw,5rem); color: var(--orange); }
.konami-overlay p { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); margin-top: 1rem; }
.konami-overlay .hint { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 2rem; letter-spacing: 0.2em; }
.konami-close {
  margin-top: 2rem;
  background: none; border: 1px solid var(--muted);
  color: var(--white); font-family: 'Space Mono', monospace;
  font-size: 0.75rem; padding: 0.6rem 1.4rem;
  cursor: none; letter-spacing: 0.1em;
  transition: border-color 0.2s, color 0.2s;
}
.konami-close:hover { border-color: var(--orange); color: var(--orange); }

/* MINI GAME */
.minigame-btn {
  position: fixed;
  bottom: 2rem; right: 2rem;
  width: 52px; height: 52px;
  background: var(--gray1);
  border: 1px solid var(--border);
  color: var(--orange);
  font-family: 'Bungee', sans-serif;
  font-size: 1.2rem;
  cursor: none;
  z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.minigame-btn:hover { background: var(--gray2); border-color: var(--orange); }
.minigame-panel {
  display: none;
  position: fixed;
  bottom: 6rem; right: 2rem;
  width: 280px;
  background: var(--gray1);
  border: 1px solid var(--border);
  padding: 1.5rem;
  z-index: 9000;
  font-family: 'Space Mono', monospace;
}
.minigame-panel.active { display: block; }
.minigame-panel h4 { font-family: 'Bungee', sans-serif; font-size: 0.9rem; color: var(--orange); margin-bottom: 0.5rem; }
.minigame-panel p { font-size: 0.65rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.5; }
.minigame-score { font-size: 2.5rem; color: var(--white); margin-bottom: 0.5rem; }
.minigame-record { font-size: 0.65rem; color: var(--muted); margin-bottom: 1rem; }
.minigame-start {
  background: var(--orange); color: var(--black);
  border: none; font-family: 'Bungee', sans-serif;
  font-size: 0.8rem; padding: 0.6rem 1.2rem;
  cursor: none; letter-spacing: 0.05em;
  transition: opacity 0.2s;
}
.minigame-start:hover { opacity: 0.85; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 2.5rem;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Bungee', sans-serif;
  font-size: 1.1rem;
  color: var(--white);
  text-decoration: none;
  letter-spacing: 0.05em;
  cursor: none;
}
.nav-logo span { color: var(--orange); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.2s;
  cursor: none;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--orange);
  text-decoration: none;
  border: 1px solid var(--orange);
  padding: 0.5rem 1.1rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
  cursor: none;
}
.nav-cta:hover { background: var(--orange); color: var(--black); }
